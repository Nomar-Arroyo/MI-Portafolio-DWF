<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows Gallery Ultra Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-circles">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
    </div>

    <section id="auth-section" class="auth-overlay">
        <div class="glass-card login-window">
            <div class="login-content">
                <h1>Inicia Sesión</h1>
                <h2>Accede a tu galería privada</h2>
                <div class="input-group">
                    <input type="text" id="username" placeholder="Nombre de usuario" required>
                    <input type="password" id="password" placeholder="Contraseña (Opcional en demo)">
                </div>
                <button id="login-btn" class="btn-primary">Entrar ahora</button>
            </div>
        </div>
    </section>

    <nav class="gallery-nav glass-card hidden" id="main-nav">
        <div class="nav-left">
            <svg class="brand-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>
            </svg>
            <div class="tabs">
                <button id="tab-library" class="tab-btn active"><h3>Library</h3></button>
                <button id="tab-moments" class="tab-btn"><h3>Moments</h3></button>
                <button id="tab-albums" class="tab-btn"><h3>Albums</h3></button>
            </div>
        </div>
        <div class="nav-right">
            <div class="user-menu-container">
                <button id="user-display-btn" class="user-btn">
                    <img id="user-avatar" src="" alt="Avatar" class="hidden">
                    <span id="user-display-name">Usuario</span> ▼
                </button>
                <div id="user-dropdown" class="dropdown-menu glass-card hidden">
                    <button onclick="changeProfilePic()">
                        <svg class="icon-svg-small" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                        Cambiar Foto
                    </button>
                    <button onclick="logoutApp()">
                        <svg class="icon-svg-small" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                        Cerrar Sesión
                    </button>
                </div>
                <input type="file" id="profile-pic-input" hidden accept="image/*">
            </div>
        </div>
    </nav>

    <div class="gallery-toolbar hidden" id="toolbar">
        <div class="title-area">
            <h1 id="gallery-view-title">Library</h1>
            <button id="btn-back-albums" class="btn-tool hidden">← Volver a Álbumes</button>
        </div>
        <div class="toolbar-actions">
            <select id="album-destination" class="select-tool">
                <option value="Library">Subir a Biblioteca</option>
            </select>
            
            <input type="file" id="upload-input" hidden accept="image/*" multiple>
            <label for="upload-input" class="btn-plus">
                <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14"/><path d="M5 12h14"/>
                </svg>
                <h3>Add Photo</h3>
            </label>

            <button id="btn-create-album" class="btn-tool accent-btn">
                <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                </svg>
                <h3>New Album</h3>
            </button>

            <button id="btn-delete-album" class="btn-tool danger hidden">
                <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
                </svg>
                <h3>Delete Album</h3>
            </button>
        </div>
    </div>

    <main class="main-container hidden" id="main-content">
        <div id="library-view" class="view-section">
            <div class="grid-inner" id="library-wrapper"></div>
        </div>

        <div id="moments-view" class="view-section hidden"></div>

        <div id="albums-view" class="view-section hidden">
            <p style="color:var(--text-sec); margin-bottom: 20px;">Doble clic para abrir un álbum</p>
            <div class="albums-grid" id="albums-wrapper"></div>
        </div>

        <div id="single-album-view" class="view-section hidden">
            <div class="grid-inner" id="single-album-wrapper"></div>
        </div>
    </main>

    <div id="action-bar" class="action-bar hidden">
        <div class="action-dropdown-container">
            <button onclick="toggleShareMenu()">
                <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.41" y2="17.49"/><line x1="15.41" y2="6.51" x2="8.59" y2="10.49"/></svg>
                <h3>Share</h3>
            </button>
            <div id="share-dropdown" class="dropdown-menu glass-card hidden dropdown-up">
                <button onclick="shareTo('Facebook')">📘 Facebook</button>
                <button onclick="shareTo('Twitter')">🐦 Twitter</button>
                <button onclick="shareTo('WhatsApp')">💬 WhatsApp</button>
                <button onclick="shareTo('Enlace')">🔗 Copiar Enlace</button>
            </div>
        </div>

        <button onclick="addSelectedToAlbum()">
            <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
            <h3>Add to Album</h3>
        </button>

        <button onclick="downloadCurrentImage()">
            <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <h3>Download</h3>
        </button>

        <button id="delete-btn" class="danger">
            <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
            <h3>Delete</h3>
        </button>

        <div class="divider"></div>
        <button class="close-action" onclick="closeActionBar()">✕</button>
    </div>

    <div id="image-modal" class="modal hidden" onclick="closeModal()">
        <button id="modal-prev-btn" class="nav-arrow left-arrow" onclick="navigateModal(-1, event)">❮</button>
        
        <div class="modal-card" onclick="event.stopPropagation()">
            <button class="modal-close-btn" onclick="closeModal()">✕</button>
            <div id="modal-counter" style="position: absolute; top: 12px; left: 20px; color: var(--text-sec); font-size: 0.9rem; font-weight: 600;">0 / 0</div>
            <div class="modal-img-container">
                <img id="modal-img" src="" alt="Vista Previa Inteligente">
            </div>
        </div>

        <button id="modal-next-btn" class="nav-arrow right-arrow" onclick="navigateModal(1, event)">❯</button>
    </div>

<script type="module" src="app.js"></script>
</body>
</html>
