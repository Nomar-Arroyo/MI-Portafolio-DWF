<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlassGallery - Tu Archivo Personal</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>

    <div id="login-screen" class="glass-container full-screen">
        <div class="glass-card login-card">
            <h2>Iniciar Sesión</h2>
            <p>Accede a tu galería personal esmerilada</p>
            <form id="login-form">
                <input type="text" id="username" placeholder="Usuario" required autocomplete="off">
                <input type="password" id="password" placeholder="Contraseña" required>
                <button type="submit" class="btn-primary">Ingresar</button>
            </form>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        
        <header class="glass-header">
            <div class="logo">GlassGallery</div>
            <nav class="user-menu">
                <div class="profile-wrapper">
                    <label for="profile-upload" class="avatar-label">
                        <img id="profile-img" src="https://via.placeholder.com/150" alt="Foto de perfil">
                        <span class="avatar-overlay">Cambiar</span>
                    </label>
                    <input type="file" id="profile-upload" accept="image/*" class="hidden-input">
                </div>
                <span id="welcome-msg">Hola, Usuario</span>
                <button id="logout-btn" class="btn-secondary">Cerrar Sesión</button>
            </nav>
        </header>

        <main class="main-layout">
            <aside class="glass-sidebar">
                <h3>Mis Álbumes</h3>
                <ul id="albums-list"></ul>
                <form id="album-form">
                    <input type="text" id="new-album-name" placeholder="Nuevo Álbum..." required>
                    <button type="submit" class="btn-add">+</button>
                </form>
            </aside>

            <section class="gallery-content">
                
                <div class="glass-card upload-zone">
                    <h3>Subir nueva imagen</h3>
                    <form id="upload-form">
                        <div class="upload-container">
                            <div class="upload-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM19 18H6c-2.21 0-4-1.79-4-4 0-2.05 1.53-3.76 3.56-3.97l1.07-.11.5-.95C8.08 7.14 9.94 6 12 6c2.62 0 4.88 1.86 5.39 4.43l.3 1.5 1.53.11c1.56.1 2.78 1.41 2.78 2.96 0 1.65-1.35 3-3 3zm-5.5-8h-3v3H8l4 4 4-4h-2.5z"/>
                                </svg>
                            </div>
                            <span class="upload-text">Arrastra tus imágenes o haz clic aquí</span>
                            <input type="file" id="image-input" accept="image/*" required>
                        </div>
                        
                        <div class="upload-controls">
                            <select id="select-album"></select>
                            <label class="checkbox-label">
                                <input type="checkbox" id="is-moment"> ✨ ¿Momento Especial?
                            </label>
                            <button type="submit" class="btn-primary">Publicar Imagen</button>
                        </div>
                    </form>
                </div>

                <div class="moments-section">
                    <h2>✨ Momentos Especiales y Festividades</h2>
                    <div id="moments-grid" class="gallery-grid"></div>
                </div>

                <div class="all-photos-section">
                    <h2>🖼️ Todas las fotos (<span id="current-album-title">General</span>)</h2>
                    <div id="gallery-grid" class="gallery-grid"></div>
                </div>
            </section>
        </main>
    </div>

    <div id="image-modal" class="modal hidden">
        <span id="close-modal" class="close-modal">&times;</span>
        <span id="modal-counter" class="modal-counter"></span>
        <div class="modal-content glass-card">
            <img id="modal-img" src="" alt="Vista ampliada">
            <div class="modal-actions">
                <button id="modal-share" class="btn-glass-capsule">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                        <path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/>
                    </svg>
                    Compartir
                </button>
                <button id="modal-delete" class="btn-glass-capsule btn-danger">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
                    </svg>
                    Eliminar
                </button>
                <button id="modal-download" class="btn-glass-capsule">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                        <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/>
                    </svg>
                    Descargar
                </button>
            </div>
        </div>
    </div>

</body>
</html>
